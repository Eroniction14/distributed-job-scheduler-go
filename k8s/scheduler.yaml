apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
spec:
  replicas: 3
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
        - name: scheduler
          image: eroniction14/distributed-job-scheduler:latest
          envFrom:
            - configMapRef:
                name: scheduler-config
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: scheduler
spec:
  selector:
    app: scheduler
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080