<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Job Scheduler UI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 2rem;
      background: #f5f5f5;
    }
    h2 {
      margin-top: 2rem;
    }
    input, select, button, textarea {
      display: block;
      margin: 0.5rem 0 1rem;
      padding: 0.5rem;
      width: 100%;
      max-width: 400px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      max-width: 700px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 0.5rem;
    }
    th {
      background-color: #eee;
    }
  </style>
</head>
<body>
  <h1>🧠 Job Scheduler</h1>

  <h2>Create Job</h2>
  <form id="jobForm">
    <input type="text" id="name" placeholder="Job Name" required />
    <input type="text" id="command" placeholder="Command (e.g., echo Hello)" required />
    <input type="text" id="schedule" placeholder="Cron Schedule (e.g., */1 * * * *)" required />
    <select id="status">
      <option value="active">Active</option>
      <option value="paused">Paused</option>
    </select>
    <button type="submit">Create Job</button>
  </form>

  <h2>All Jobs</h2>
  <button onclick="fetchJobs()">Refresh Jobs</button>
  <table id="jobsTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Command</th>
        <th>Schedule</th>
        <th>Status</th>
        <th>Last Run</th>
        <th>Toggle Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <h2>Job Logs</h2>
  <button onclick="fetchLogs()">Refresh Logs</button>
  <table id="logsTable">
    <thead>
      <tr>
        <th>Job ID</th>
        <th>Time</th>
        <th>Result</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    const API = "http://localhost:8080/api";

    document.getElementById("jobForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const body = {
        name: document.getElementById("name").value,
        command: document.getElementById("command").value,
        schedule: document.getElementById("schedule").value,
        status: document.getElementById("status").value,
      };
      const res = await fetch(`${API}/jobs`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (res.ok) {
        alert("Job Created!");
        fetchJobs();
      } else {
        const error = await res.text();
        alert("Error: " + error);
      }
    });

    async function fetchJobs() {
      const res = await fetch(`${API}/jobs/all`);
      const jobs = await res.json();
      const tbody = document.querySelector("#jobsTable tbody");
      tbody.innerHTML = "";
      jobs.forEach((j) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${j.id}</td>
          <td>${j.name}</td>
          <td>${j.command}</td>
          <td>${j.schedule}</td>
          <td>${j.status}</td>
          <td>${j.last_run ?? "-"}</td>
          <td>
            <button onclick="toggleStatus(${j.id}, '${j.status}')">
              ${j.status === "active" ? "Pause" : "Resume"}
            </button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function toggleStatus(id, currentStatus) {
      const newStatus = currentStatus === "active" ? "paused" : "active";
      await fetch(`${API}/jobs/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status: newStatus }),
      });
      fetchJobs();
    }

    async function fetchLogs() {
      const res = await fetch(`${API}/job_logs`);
      const logs = await res.json();
      const tbody = document.querySelector("#logsTable tbody");
      tbody.innerHTML = "";
      logs.forEach((l) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${l.job_id}</td>
          <td>${new Date(l.run_time).toLocaleString()}</td>
          <td>${l.result}</td>
          <td>${l.status}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    fetchJobs();
    fetchLogs();
  </script>
</body>
</html>
